    <!-- Language routing + legacy redirects, run before the app loads.
         Every language is prefixed (/pl, /en, /de). The root "/" redirects to
         the visitor's language; bare paths (and old .html URLs) are redirected
         to their prefixed equivalent. Relies on the 404.html SPA fallback so
         any path reaches this script on GitHub Pages. -->
    <script>
      (function () {
        var path = location.pathname;
        var map = {
          "/index.html": "/pl", "/index_en.html": "/en",
          "/pokoje.html": "/pl", "/rooms.html": "/en",
          "/ozyrys.html": "/pl", "/osiris.html": "/en",
          "/laponia.html": "/pl", "/lapland.html": "/en",
          "/regulamin.html": "/pl/terms", "/terms.html": "/en/terms",
          "/bezpieczenstwo.html": "/pl/safety", "/safety.html": "/en/safety",
          "/faq.html": "/pl/faq", "/faq_en.html": "/en/faq",
          "/kontakt.html": "/pl/contact", "/contact.html": "/en/contact",
          "/rezerwacje.html": "/pl/booking", "/bookings.html": "/en/booking",
          "/vouchery.html": "/pl/vouchers", "/vouchers.html": "/en/vouchers"
        };
        if (map[path]) { location.replace(map[path] + location.search + location.hash); return; }
        var seg = path.split("/")[1];
        if (seg === "pl" || seg === "en" || seg === "de") return; // already localized
        if (path === "/" || path === "") {
          var saved = null;
          try { saved = localStorage.getItem("lang"); } catch (e) {}
          var lang;
          if (saved === "pl" || saved === "en" || saved === "de") {
            lang = saved;
          } else {
            var n = (navigator.language || "").slice(0, 2).toLowerCase();
            lang = n === "en" ? "en" : n === "de" ? "de" : "pl";
          }
          location.replace("/" + lang + location.search + location.hash);
        } else {
          location.replace("/pl" + path + location.search + location.hash);
        }
      })();
    </script>
